# Stock Radar — Default Configuration
# Secrets use ${ENV_VAR} placeholders — set them in your .env file.

api_keys:
  alpha_vantage: "${ALPHA_VANTAGE_API_KEY}"
  finnhub: "${FINNHUB_API_KEY}"
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"

ollama:
  host: "http://localhost:11434"
  default_model: "llama3.1:8b"
  timeout_seconds: 30

cache:
  db_path: "data/stock_radar.db"
  chroma_path: "data/chroma_data"

sec_edgar:
  user_agent_email: "${SEC_EDGAR_EMAIL}"

predictions:
  db_path: "data/predictions.db"

agents:
  earnings_linguist:
    enabled: true
    default_horizon_days: 5
    escalation_confidence_threshold: 0.3
    escalation_transcript_length: 24000
    ollama_model: null
    anthropic_model: "claude-sonnet-4-20250514"
    openai_model: "gpt-4o"
    temperature: 0.1
    max_tokens: 4096
  narrative_divergence:
    enabled: true
    default_horizon_days: 10
    escalation_confidence_threshold: 0.3
    escalation_min_articles: 5
    ollama_model: null
    anthropic_model: "claude-sonnet-4-20250514"
    openai_model: "gpt-4o"
    temperature: 0.1
    max_tokens: 2048
  sec_filing_analyzer:
    enabled: true
    default_horizon_days: 15
    escalation_confidence_threshold: 0.3
    escalation_filing_count: 30
    ollama_model: null
    anthropic_model: "claude-sonnet-4-20250514"
    openai_model: "gpt-4o"
    temperature: 0.1
    max_tokens: 2048
  contagion_mapper:
    enabled: true
    default_horizon_days: 5
    escalation_confidence_threshold: 0.3
    ollama_model: null
    anthropic_model: "claude-sonnet-4-20250514"
    openai_model: "gpt-4o"
    temperature: 0.1
    max_tokens: 2048

scoring:
  horizon_buffer_days: 1
  lookback_days: 365

orchestrator:
  enabled: true
  contagion_pairs_path: "config/contagion_pairs.yaml"
  skip_ingestion: false
  skip_scoring: false
